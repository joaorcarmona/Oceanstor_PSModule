# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
#
# https://github.com/microsoft/action-psscriptanalyzer
# For more information on PSScriptAnalyzer in general, see
# https://github.com/PowerShell/PSScriptAnalyzer

name: PowerShell CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '31 8 * * 1'

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PSScriptAnalyzer
        uses: microsoft/psscriptanalyzer-action@2044ae068e37d0161fa2127de04c19633882f061
        with:
          # Check https://github.com/microsoft/action-psscriptanalyzer for more info about the options.
          # Full default rule set minus excluded rules in the settings file.
          path: ./POSH-Oceanstor
          recurse: true
          settings: ./PSScriptAnalyzerSettings.psd1
          output: results.sarif
      # Upload the SARIF file generated in the previous step
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

  pester-test:
    name: Pester Unit Tests
    # Cross-platform trial: Ubuntu confirmed clean locally via a Linux
    # PowerShell container (312/312 passed) before adding it here.
    # macOS is deliberately not in the matrix yet - it's added in a
    # follow-up commit once Ubuntu's real CI run is confirmed green,
    # since Docker on Windows cannot run macOS containers to pre-verify it.
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install PowerShell Modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Run unit tests with code coverage
        shell: pwsh
        run: |
          ./Tests/Invoke-UnitTests.ps1 -Output Normal -ResultPath ./TestResults/Pester.xml -CoveragePath ./TestResults/Coverage.xml
      - name: Upload Pester results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: pester-test-results-${{ matrix.os }}
          path: |
            TestResults/Pester.xml
            TestResults/Coverage.xml
          if-no-files-found: error
